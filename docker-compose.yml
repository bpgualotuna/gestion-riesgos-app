services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
        VITE_APP_NAME: ${VITE_APP_NAME:-COMWARE Risk Management}
        VITE_ENV: ${VITE_ENV:-production}
    ports:
      - "3000:80"
    env_file:
      - .env
    restart: unless-stopped
