# Producción: push a master (rama principal de este repo).
# develop debe estar alineada con master antes de desplegar; ver .github/BRANCHING.md
name: Deploy Frontend

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            mkdir -p ~/app-frontend
            cd ~/app-frontend

            git config --global --add safe.directory /home/${{ secrets.SSH_USER }}/app-frontend

            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git fetch origin master
              git reset --hard origin/master
            fi

            cat > .env <<'END_ENV_CONTENT'
            ${{ secrets.DOTENV_FILE }}
            END_ENV_CONTENT
            sed -i '1s/^\xEF\xBB\xBF//' .env 2>/dev/null || true
            tr -d '\r' < .env > .env.tmp && mv .env.tmp .env

            sudo docker system prune -f 2>/dev/null || true
            sudo docker compose up -d --build --force-recreate
            sudo docker image prune -f 2>/dev/null || true
