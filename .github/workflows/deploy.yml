# Deploy Frontend - Gestión de Riesgos (rama master). Repo privado: secret GH_CLONE_TOKEN.
# Para recibir correo si falla o si desplegó bien: GitHub → Settings → Notifications → Actions → Email.
name: Deploy Frontend

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            mkdir -p ~/app-frontend
            cd ~/app-frontend

            echo "==> Actualizando código (master)..."
            REPO="${{ github.repository }}"
            if [ -n "${{ secrets.GH_CLONE_TOKEN }}" ]; then
              URL="https://x-access-token:${{ secrets.GH_CLONE_TOKEN }}@github.com/${REPO}.git"
            else
              URL="https://github.com/${REPO}.git"
            fi
            if [ ! -d ".git" ]; then
              [ -n "$(ls -A 2>/dev/null)" ] && rm -rf ./* ./.[!.]* 2>/dev/null || true
              git clone "$URL" .
              git checkout master 2>/dev/null || git checkout main
            else
              git remote set-url origin "$URL" 2>/dev/null || true
              git fetch origin master 2>/dev/null || git fetch origin main
              git reset --hard origin/master 2>/dev/null || git reset --hard origin/main
              git checkout master 2>/dev/null || git checkout main
            fi

            echo "==> .env..."
            echo "${{ secrets.DOTENV_FILE }}" > .env

            echo "==> Docker up --build..."
            sudo docker compose up -d --build

            echo "==> Limpieza..."
            docker image prune -f 2>/dev/null || sudo docker image prune -f 2>/dev/null || true
            echo "==> Deploy frontend listo."
