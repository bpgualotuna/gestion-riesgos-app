# =============================================================================
# Deploy Frontend - Gestión de Riesgos (COMWARE)
# Rama: master. Cada push a master reconstruye y despliega en el servidor vía SSH + Docker.
# Repo privado: añadir secret GH_CLONE_TOKEN (Personal Access Token con permiso repo).
# =============================================================================

name: Deploy Frontend

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            export DEPLOY_DIR="$HOME/app-frontend"
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            echo "==> Configurando Git..."
            git config --global --add safe.directory "$DEPLOY_DIR" 2>/dev/null || true

            echo "==> Actualizando código (master)..."
            REPO="${{ github.repository }}"
            if [ -n "${{ secrets.GH_CLONE_TOKEN }}" ]; then
              CLONE_URL="https://x-access-token:${{ secrets.GH_CLONE_TOKEN }}@github.com/${REPO}.git"
            else
              CLONE_URL="https://github.com/${REPO}.git"
            fi
            if [ ! -d ".git" ]; then
              git clone --branch master "$CLONE_URL" .
            else
              git remote set-url origin "$CLONE_URL" 2>/dev/null || true
              git fetch origin master
              git reset --hard origin/master
              git checkout master
            fi

            echo "==> Creando .env..."
            echo "${{ secrets.DOTENV_FILE }}" > .env

            echo "==> Build Docker (sin caché)..."
            export BUILDKIT_PROGRESS=plain
            docker compose build --no-cache --progress=plain 2>&1 || docker-compose build --no-cache 2>&1

            echo "==> Levantando contenedores..."
            docker compose up -d --build || docker-compose up -d --build

            echo "==> Limpieza de imágenes..."
            docker image prune -f 2>/dev/null || true
            echo "==> Deploy frontend listo."
