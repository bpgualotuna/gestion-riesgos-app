# =============================================================================
# Deploy Frontend - Gestión de Riesgos (COMWARE)
# Rama: master. Cada push a master reconstruye y despliega en el servidor vía SSH + Docker.
# GitHub envía las notificaciones de éxito/fallo al correo de tu cuenta (automático).
# =============================================================================

name: Deploy Frontend

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            export DEPLOY_DIR="$HOME/app-frontend"
            mkdir -p "$DEPLOY_DIR"
            cd "$DEPLOY_DIR"

            git config --global --add safe.directory "$DEPLOY_DIR" 2>/dev/null || true

            if [ ! -d ".git" ]; then
              git clone --branch master https://github.com/${{ github.repository }}.git .
            else
              git fetch origin master
              git reset --hard origin/master
              git checkout master
            fi

            echo "${{ secrets.DOTENV_FILE }}" > .env

            docker compose build --no-cache || docker-compose build --no-cache
            docker compose up -d --build || docker-compose up -d --build

            docker image prune -f 2>/dev/null || true
