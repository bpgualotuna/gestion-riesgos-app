name: Deploy Frontend

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Entrar a la carpeta
            mkdir -p ~/app-frontend
            cd ~/app-frontend
            
            # 2. Actualizar código (Lógica simple que te funcionaba)
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }}.git .
            else
              git fetch origin master
              git reset --hard origin/master
            fi

            # 3. Inyectar variables
            echo "${{ secrets.DOTENV_FILE }}" > .env

            # 4. LIMPIEZA PREVENTIVA (Para que no falle por falta de espacio)
            sudo docker system prune -f

            # 5. Levantar con Build (Añadimos --force-recreate para asegurar cambios)
            sudo docker compose up -d --build --force-recreate

            # 6. Limpieza final de imágenes viejas
            sudo docker image prune -f